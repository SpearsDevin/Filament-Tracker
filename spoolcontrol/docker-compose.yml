services:
  spoolcontrol:
    build: .
    container_name: spoolcontrol
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist the database on the host machine so data survives container rebuilds
      - ./data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - NODE_ENV=production
